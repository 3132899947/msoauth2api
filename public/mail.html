<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MS OAuth2API Cloudflare</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;margin:24px;background:#f6f6f6;color:#111}main{max-width:980px;margin:auto;background:#fff;padding:24px;border-radius:14px;box-shadow:0 8px 30px #0001}input,select,button,textarea{font:inherit;padding:10px;border:1px solid #ccc;border-radius:8px}input,textarea{width:100%;box-sizing:border-box}label{display:block;margin:12px 0 6px;font-weight:600}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.buttons{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0}button{cursor:pointer;background:#111;color:#fff;border-color:#111}pre{white-space:pre-wrap;background:#111;color:#eee;padding:16px;border-radius:10px;overflow:auto}.mail{border-top:1px solid #eee;padding:14px 0}.mail h3{margin:0 0 8px}@media(max-width:720px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<main>
  <h1>MS OAuth2API Cloudflare</h1>
  <p>Graph-only 收信版：支持最新邮件、邮件列表、刷新 Token、清空收件箱/垃圾箱。</p>
  <div class="grid">
    <div><label>邮箱</label><input id="email" placeholder="name@outlook.com"></div>
    <div><label>Client ID</label><input id="client_id"></div>
    <div><label>Refresh Token</label><input id="refresh_token"></div>
    <div><label>接口密码 PASSWORD</label><input id="password" type="password"></div>
    <div><label>邮箱文件夹</label><select id="mailbox"><option>INBOX</option><option>Junk</option></select></div>
    <div><label>列表数量</label><input id="limit" value="20"></div>
  </div>
  <div class="buttons">
    <button onclick="callApi('/api/mail-new')">获取最新一封</button>
    <button onclick="callApi('/api/mail-all')">获取全部邮件</button>
    <button onclick="callApi('/api/refresh-token')">刷新 Token</button>
    <button onclick="callApi('/api/process-inbox')">清空收件箱</button>
    <button onclick="callApi('/api/process-junk')">清空垃圾箱</button>
  </div>
  <div id="result"></div>
</main>
<script>
function params(){
  const data = new URLSearchParams();
  for (const id of ['email','client_id','refresh_token','password','mailbox','limit']) data.set(id, document.getElementById(id).value.trim());
  return data;
}
async function callApi(path){
  const res = await fetch(path + '?' + params().toString());
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); } catch { data = text; }
  render(data, res.ok);
}
function render(data, ok){
  const box = document.getElementById('result');
  if (Array.isArray(data)) {
    box.innerHTML = data.map(m => `<div class="mail"><h3>${escapeHtml(m.subject || '(无主题)')}</h3><p><b>From:</b> ${escapeHtml(m.send || '')}</p><p><b>Date:</b> ${escapeHtml(m.date || '')}</p><p>${escapeHtml(m.text || '')}</p></div>`).join('') || '<pre>[]</pre>';
  } else {
    box.innerHTML = `<pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre>`;
  }
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
</script>
</body>
</html>
